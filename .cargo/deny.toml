# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
version = 2
# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",
    "Zlib",
    "Unicode-3.0",
    "OpenSSL",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
# List of explicitly disallowed licenses
# Banking/proprietary software is incompatible with copyleft licenses
exceptions = [
    # r-efi: UEFI interface crate used as a transitive dependency.
    # License is "Apache-2.0 OR LGPL-2.1-or-later OR MIT" — we use it under
    # Apache-2.0 or MIT; the LGPL option is never exercised. cargo-deny v2
    # requires all terms of an OR expression to be explicitly allowed.
    { name = "r-efi", allow = ["LGPL-2.1-or-later"] },
]
confidence-threshold = 0.8

# Deny these licenses explicitly
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate version requirement is `*`
wildcards = "deny"
# List of crates to deny
deny = []
# List of crates that are allowed
skip = []
skip-tree = []

[sources]
# Lint level for what to happen when a crate from a crate registry that is not
# in the allow list is encountered
unknown-registry = "deny"
# Lint level for what to happen when a crate from a git repository that is not
# in the allow list is encountered
unknown-git = "warn"
# List of URLs for allowed crate registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# List of URLs for allowed Git repositories
allow-git = []
