---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bindy-scout
rules:
  # Watch and mutate Ingresses across all namespaces.
  # kube-rs finalizer::finalizer() patches the main resource metadata to add/remove
  # finalizers, so patch+update on ingresses (not just the subresource) is required.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Also grant the finalizers subresource for forward-compatibility.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses/finalizers"]
    verbs: ["update"]
  # Watch LoadBalancer Services for external IP → ARecord automation.
  # patch+update required to add/remove the Scout finalizer on Service metadata.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # services/finalizers subresource for forward-compatibility.
  - apiGroups: [""]
    resources: ["services/finalizers"]
    verbs: ["update"]
  # Watch HTTPRoutes, TLSRoutes, and TCPRoutes from the Gateway API
  # (gateway.networking.k8s.io) to automate A record creation for Gateway
  # routes with opt-in annotations. Gateways are read to follow a route's
  # parentRefs back to the serving gateway and discover its external IP.
  # patch+update required to add/remove the Scout finalizer on route metadata.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "tlsroutes", "tcproutes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # route/finalizers subresource for forward-compatibility.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes/finalizers", "tlsroutes/finalizers", "tcproutes/finalizers"]
    verbs: ["update"]
  # Gateways are read-only — Scout reads status.addresses to discover external IPs.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch"]
  # Read DNSZones for zone validation (same-cluster mode only; remote mode uses remote client)
  - apiGroups: ["bindy.firestoned.io"]
    resources: ["dnszones"]
    verbs: ["get", "list", "watch"]
  # NOTE: there is deliberately no cluster-wide Secret rule here. Reading the
  # remote-cluster kubeconfig Secret (Phase 2 only) is granted by a namespaced,
  # resourceNames-restricted Role/RoleBinding instead — see secrets-reader-rbac.yaml,
  # applied only if you use Phase 2 (multi-cluster) mode.
  # Read Namespace labels for --namespace-selector / BINDY_SCOUT_NAMESPACE_SELECTOR: scout
  # checks each source object's namespace against the configured selector before acting, via
  # a List scoped to that single namespace by name. Namespace metadata (name/labels) is
  # low-sensitivity, unlike the cluster-wide secrets read above.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
