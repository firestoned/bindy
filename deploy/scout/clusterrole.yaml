---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bindy-scout
rules:
  # Watch Ingresses across all namespaces
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # Write finalizers on Ingresses (Phase 1.5: cleanup on deletion)
  # Required to add/remove bindy.firestoned.io/arecord-finalizer
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses/finalizers"]
    verbs: ["update"]
  # Read DNSZones for zone validation (same-cluster mode only; remote mode uses remote client)
  - apiGroups: ["bindy.firestoned.io"]
    resources: ["dnszones"]
    verbs: ["get", "list", "watch"]
  # Read kubeconfig Secret for remote cluster connection (Phase 2 only)
  # Scope this to a Role in the specific Secret's namespace for production deployments
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
