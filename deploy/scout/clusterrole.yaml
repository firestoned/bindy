---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bindy-scout
rules:
  # Watch and mutate Ingresses across all namespaces.
  # kube-rs finalizer::finalizer() patches the main resource metadata to add/remove
  # finalizers, so patch+update on ingresses (not just the subresource) is required.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Also grant the finalizers subresource for forward-compatibility.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses/finalizers"]
    verbs: ["update"]
  # Watch LoadBalancer Services for external IP → ARecord automation.
  # patch+update required to add/remove the Scout finalizer on Service metadata.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # services/finalizers subresource for forward-compatibility.
  - apiGroups: [""]
    resources: ["services/finalizers"]
    verbs: ["update"]
  # Watch HTTPRoutes and TLSRoutes from the Gateway API (gateway.networking.k8s.io)
  # to automate A record creation for Gateway routes with opt-in annotations.
  # No patch/update needed — Scout reads spec/metadata only, no mutation.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "tlsroutes"]
    verbs: ["get", "list", "watch"]
  # Read DNSZones for zone validation (same-cluster mode only; remote mode uses remote client)
  - apiGroups: ["bindy.firestoned.io"]
    resources: ["dnszones"]
    verbs: ["get", "list", "watch"]
  # Read kubeconfig Secret for remote cluster connection (Phase 2 only)
  # Scope this to a Role in the specific Secret's namespace for production deployments
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
