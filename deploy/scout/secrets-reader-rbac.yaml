#
# Phase 2: Secrets-reader RBAC for Scout (OPT-IN — only needed for multi-cluster mode)
#
# Apply this manifest ONLY if you run Scout with BINDY_SCOUT_REMOTE_SECRET set (Phase 2 /
# multi-cluster mode, where Scout reads a remote-cluster kubeconfig from a Secret). If you
# use Scout in same-cluster mode (the default), do NOT apply this file — Scout needs no
# Secret access at all in that mode.
#
# The Scout ClusterRole (clusterrole.yaml) deliberately grants NO cluster-wide Secret
# access. This Role is namespaced to Scout's own namespace and `resourceNames`-restricted
# to the single kubeconfig Secret, so Scout can read exactly that one Secret — not every
# Secret in this namespace, and not any Secret in any other namespace.
#
# Before applying: replace BOTH occurrences of "bindy-scout-remote-kubeconfig" below with
# the actual Secret name you configured via BINDY_SCOUT_REMOTE_SECRET (and the
# `bindy-system` namespace if you deploy Scout elsewhere).
#
# Usage:
#   kubectl --context=<workload-cluster> apply -f secrets-reader-rbac.yaml
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bindy-scout-secrets-reader
  namespace: bindy-system
  labels:
    app.kubernetes.io/name: bindy
    app.kubernetes.io/component: scout
rules:
  # Read exactly the one remote-cluster kubeconfig Secret — resourceNames restricts
  # this rule to only the named object(s), not every Secret in this namespace.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["bindy-scout-remote-kubeconfig"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bindy-scout-secrets-reader
  namespace: bindy-system
  labels:
    app.kubernetes.io/name: bindy
    app.kubernetes.io/component: scout
subjects:
  - kind: ServiceAccount
    name: bindy-scout
    namespace: bindy-system
roleRef:
  kind: Role
  name: bindy-scout-secrets-reader
  apiGroup: rbac.authorization.k8s.io
