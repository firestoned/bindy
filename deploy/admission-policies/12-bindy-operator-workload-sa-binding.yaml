#
# Binds bindy-operator-workload-sa-validation cluster-wide.
# `validationActions: [Deny]` rejects on failure rather than merely auditing.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: bindy-operator-workload-sa-validation-binding
  labels:
    app.kubernetes.io/name: bindy
    app.kubernetes.io/part-of: bindy
    app.kubernetes.io/component: admission-policy
spec:
  policyName: bindy-operator-workload-sa-validation
  validationActions:
    - Deny
