#
# Binds bindy-acl-validation to all namespaces that hold bindy CRDs.
# `validationActions: [Deny]` causes admission to be denied (rather than
# audited / warned) when any of the policy's validations fails.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: bindy-acl-validation-binding
  labels:
    app.kubernetes.io/name: bindy
    app.kubernetes.io/part-of: bindy
    app.kubernetes.io/component: admission-policy
spec:
  policyName: bindy-acl-validation
  validationActions:
    - Deny
  # No matchResources -> applies cluster-wide to every resource the policy's
  # matchConstraints already targets (bind9clusters, bind9instances,
  # clusterbind9providers in the bindy.firestoned.io group).
