#
# Binds bindy-pod-shape-validation cluster-wide. `validationActions: [Deny]`
# means admission is rejected on failure rather than merely audited.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: bindy-pod-shape-validation-binding
  labels:
    app.kubernetes.io/name: bindy
    app.kubernetes.io/part-of: bindy
    app.kubernetes.io/component: admission-policy
spec:
  policyName: bindy-pod-shape-validation
  validationActions:
    - Deny
