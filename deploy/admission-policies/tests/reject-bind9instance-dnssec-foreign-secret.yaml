# Should be REJECTED by bindy-pod-shape-validation.
# Demonstrates audit finding H2: spec.dnssec.signing.keysFrom.secretRef mounts
# a Secret into the operand Pod outside the spec.volumes allow-list. Naming a
# foreign Secret (e.g. another tenant's RNDC key) without the bindy- prefix
# would let an attacker read it from /etc/bind/keys. The keysFrom prefix check
# rejects this at admission.
apiVersion: bindy.firestoned.io/v1beta1
kind: Bind9Instance
metadata:
  name: vap-pod-shape-reject-dnssec-foreign-secret
  namespace: bindy-system
spec:
  clusterRef: ""
  role: primary
  replicas: 1
  config:
    dnssec:
      signing:
        enabled: true
        keysFrom:
          secretRef:
            name: production-primary-rndc-key
