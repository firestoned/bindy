# Should pass admission with bindy-dnssec-policy-validation deployed:
# dnssecPolicy is a safe identifier.
apiVersion: bindy.firestoned.io/v1beta1
kind: DNSZone
metadata:
  name: vap-test-zone-accept-dnssec-policy
  namespace: bindy-system
spec:
  zoneName: dnssec-accept.example.com.
  dnssecPolicy: high-security
  soaRecord:
    primaryNs: ns1.example.com.
    adminEmail: hostmaster@example.com
    serial: 2026060901
    refresh: 3600
    retry: 600
    expire: 604800
    negativeTtl: 86400
