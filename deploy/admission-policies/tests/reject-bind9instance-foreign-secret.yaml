# Should be REJECTED by bindy-pod-shape-validation.
# Demonstrates F-001: mounting a Secret outside the bindy- name prefix
# (e.g. another tenant's RNDC key, the operator's own SA token, an
# ESO-synced secret in bindy-system, etc.).
apiVersion: bindy.firestoned.io/v1beta1
kind: Bind9Instance
metadata:
  name: vap-pod-shape-reject-foreign-secret
  namespace: bindy-system
spec:
  clusterRef: ""
  role: primary
  replicas: 1
  volumes:
    - name: stolen
      secret:
        secretName: production-primary-rndc-key
  volumeMounts:
    - name: stolen
      mountPath: /data/stolen
      readOnly: true
