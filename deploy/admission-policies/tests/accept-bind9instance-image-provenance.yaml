# Should pass admission with bindy-image-provenance-validation deployed.
# Both overrides come from trusted provenance and carry immutable-ish
# references (named non-latest tag / firestoned GHCR namespace).
apiVersion: bindy.firestoned.io/v1beta1
kind: Bind9Instance
metadata:
  name: vap-image-provenance-accept
  namespace: bindy-system
spec:
  clusterRef: ""
  role: primary
  replicas: 1
  image:
    image: internetsystemsconsortium/bind9:9.18
  bindcarConfig:
    image: ghcr.io/firestoned/bindcar:v0.7.3
