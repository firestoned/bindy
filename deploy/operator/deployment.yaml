---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bindy
  namespace: bindy-system
  labels:
    app: bindy
    version: v1
spec:
  # Number of operator replicas
  # For high availability, set to 2 or 3
  # Leader election ensures only one instance is active at a time
  # Non-leader instances stand by for automatic failover (~15s)
  replicas: 1
  selector:
    matchLabels:
      app: bindy
  template:
    metadata:
      labels:
        app: bindy
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: bindy
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        # Required for Pod Security Admission `restricted` (recommended on
        # bindy-system since the bindcar 0.7.0 migration — see deploy/pod-hardening.yaml).
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bindy
          image: ghcr.io/firestoned/bindy:latest
          imagePullPolicy: IfNotPresent
          args: ["run"]
          env:
            - name: RUST_LOG
              value: "info"
            - name: RUST_LOG_FORMAT
              value: "text"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Leader election configuration
            - name: BINDY_ENABLE_LEADER_ELECTION
              value: "true"
            - name: BINDY_LEASE_NAME
              value: "bindy-leader"
            - name: BINDY_LEASE_DURATION_SECONDS
              value: "15"
            - name: BINDY_LEASE_RENEW_DEADLINE_SECONDS
              value: "10"
            - name: BINDY_LEASE_RETRY_PERIOD_SECONDS
              value: "2"
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # bindcar 0.7.0 (Mode B / TokenReview) enforces the token audience.
            # The operator presents this projected token (audience: bindcar) as
            # the Bearer credential to the bindcar HTTP API; bindy reads it from
            # /var/run/secrets/bindcar/token (BINDCAR_TOKEN_PATH).
            - name: bindcar-token
              mountPath: /var/run/secrets/bindcar
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        # Short-lived ServiceAccount token minted with the `bindcar` audience so
        # bindcar 0.7.0 accepts it (its default BIND_TOKEN_AUDIENCES is `bindcar`).
        - name: bindcar-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: bindcar
                  expirationSeconds: 3600
                  path: token
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - bindy
                topologyKey: kubernetes.io/hostname
