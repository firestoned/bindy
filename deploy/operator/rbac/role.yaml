---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bindy-role
  labels:
    app.kubernetes.io/name: bindy
    app.kubernetes.io/component: rbac
  annotations:
    # Trivy suppressions - see inline justifications at affected rules
    trivy.aquasecurity.com/ignore: KSV-0041,KSV-0056
rules:
  # Bind9Instance resources
  - apiGroups: ["bindy.firestoned.io"]
    resources: ["bind9instances"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    # Permissions needed:
    # - "get", "list", "watch": Read instances for status updates
    # - "create": Create instances for Bind9Cluster scaling
    # - "update", "patch": Update instance configuration
    # - "delete": Scale down instances (Bind9Cluster reconciler) and finalizer cleanup

  # Bind9Instance status subresource (separate permissions for least privilege)
  - apiGroups: ["bindy.firestoned.io"]
    resources: ["bind9instances/status"]
    verbs: ["get", "update", "patch"]
    # Status updates only need get/update/patch, not create/delete

  # Bind9Cluster resources
  - apiGroups: ["bindy.firestoned.io"]
    resources: ["bind9clusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    # Permissions needed:
    # - "get", "list", "watch": Read clusters for status updates
    # - "create": Create clusters for ClusterBind9Provider
    # - "update", "patch": Update cluster configuration
    # - "delete": Clean up clusters (ClusterBind9Provider finalizer cleanup)

  # Bind9Cluster status subresource (separate permissions for least privilege)
  - apiGroups: ["bindy.firestoned.io"]
    resources: ["bind9clusters/status"]
    verbs: ["get", "update", "patch"]
    # Status updates only need get/update/patch, not create/delete

  # ClusterBind9Provider resources - cluster-scoped, NO DELETE (least privilege)
  - apiGroups: ["bindy.firestoned.io"]
    resources: ["clusterbind9providers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
    # Removed: "delete" - Use bindy-admin-role for deletions

  # ClusterBind9Provider status subresource (separate permissions for least privilege)
  - apiGroups: ["bindy.firestoned.io"]
    resources: ["clusterbind9providers/status"]
    verbs: ["get", "update", "patch"]
    # Status updates only need get/update/patch, not create/delete

  # DNSZone resources - NO DELETE (least privilege)
  - apiGroups: ["bindy.firestoned.io"]
    resources: ["dnszones"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
    # Removed: "delete" - Use bindy-admin-role for deletions

  # DNSZone status subresource (separate permissions for least privilege)
  - apiGroups: ["bindy.firestoned.io"]
    resources: ["dnszones/status"]
    verbs: ["get", "update", "patch"]
    # Status updates only need get/update/patch, not create/delete

  # Record resources - NO DELETE (least privilege)
  - apiGroups: ["bindy.firestoned.io"]
    resources:
      - "arecords"
      - "aaaarecords"
      - "txtrecords"
      - "cnamerecords"
      - "mxrecords"
      - "nsrecords"
      - "srvrecords"
      - "caarecords"
    verbs: ["get", "list", "watch", "create", "update", "patch"]
    # Removed: "delete" - Use bindy-admin-role for deletions

  # Record status subresources (separate permissions for least privilege)
  - apiGroups: ["bindy.firestoned.io"]
    resources:
      - "arecords/status"
      - "aaaarecords/status"
      - "txtrecords/status"
      - "cnamerecords/status"
      - "mxrecords/status"
      - "nsrecords/status"
      - "srvrecords/status"
      - "caarecords/status"
    verbs: ["get", "update", "patch"]
    # Status updates only need get/update/patch, not create/delete

  # Kubernetes Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    # Permissions needed:
    # - "get", "list", "watch": Read deployment status
    # - "create": Create deployments for Bind9Instance
    # - "update", "patch": Update deployment configuration
    # - "delete": Finalizer cleanup (Bind9Instance reconciler)
    # Note: Owner references provide automatic GC, but finalizer explicitly deletes

  # Kubernetes Services
  # trivy:ignore:KSV-0056
  # Suppression Justification (KSV-0056 - Services/Endpoints Access):
  #   REQUIRED FOR CORE FUNCTIONALITY - DNS operator MUST manage Services to expose BIND9 servers.
  #   Mitigation Strategy:
  #     1. Namespace-scoped via RoleBinding - cannot intercept traffic in other namespaces
  #     2. Owner references - Services are bound to Bind9Instance resources (automatic cleanup)
  #     3. Finalizers - Explicit deletion only when parent Bind9Instance is deleted
  #     4. Service selectors - Only route traffic to pods owned by this operator
  #     5. NetworkPolicy enforcement - Traffic interception prevented by cluster NetworkPolicies
  #   Risk Acceptance: Service management is fundamental to DNS server operation. Network policies
  #                    and namespace isolation provide defense-in-depth against traffic interception.
  #   Compliance: NIST SP 800-190 (container orchestration security), CIS Kubernetes Benchmark 5.1.5
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    # Permissions needed:
    # - "get", "list", "watch": Read service status and endpoints
    # - "create": Create services for Bind9Instance
    # - "update", "patch": Update service configuration (preserves clusterIP)
    # - "delete": Finalizer cleanup (Bind9Instance reconciler)
    # Note: Owner references provide automatic GC, but finalizer explicitly deletes

  # Kubernetes ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    # Permissions needed:
    # - "get", "list", "watch": Read configuration data
    # - "create": Create ConfigMaps for Bind9Instance configuration
    # - "update", "patch": Update BIND9 configuration (zone changes)
    # - "delete": Finalizer cleanup (Bind9Instance reconciler)
    # Note: Owner references provide automatic GC, but finalizer explicitly deletes

  # Kubernetes Secrets - RNDC key management (CRITICAL: least privilege for sensitive data)
  # trivy:ignore:KSV-0041
  # Suppression Justification (KSV-0041 - Secrets Access):
  #   REQUIRED FOR CORE FUNCTIONALITY - DNS operator MUST read RNDC secrets across the
  #   namespaces it watches for BIND9 authentication.
  #   B-5 hardening (2026-06-09): cluster-wide access is now READ-ONLY. The mutating verbs
  #   (create/update/patch/delete) have been moved out of this ClusterRole into the
  #   namespaced Role `bindy-secrets-writer` (see secrets-role.yaml), bound only in the
  #   operator namespace. This removes cluster-wide Secret WRITE — a compromised operator
  #   can no longer create, modify, or delete Secrets in other namespaces (e.g. kube-system).
  #   For multi-namespace deployments, replicate the `bindy-secrets-writer` Role/RoleBinding
  #   into each target namespace.
  #   Mitigation Strategy:
  #     1. Read-only cluster-wide; write verbs namespaced to the operator namespace only
  #     2. Purpose-specific secrets - only manages secrets with the "-rndc-key" suffix
  #     3. Audit logging enabled - all secret operations logged for compliance (PCI-DSS 10.2)
  #     4. RBAC separation - admin role required for cluster-wide destructive secret access
  #   Risk Acceptance: Cluster-wide Secret READ is required by the controller's owned-Secret
  #     watch (`.owns(Api::<Secret>::all)`), which RBAC cannot filter by name/label.
  #   Compliance: PCI-DSS 7.1.2 (minimal permissions), NIST SP 800-190 (container secrets management)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
    # Cluster-wide, READ-ONLY:
    # - "get": Load RNDC keys for zone updates (DNSZone reconciler)
    # - "list": Check if RNDC secrets exist (Bind9Cluster reconciler)
    # - "watch": Monitor RNDC secret changes (Bind9Instance .owns(Secret) watch)
    # Mutating verbs (create/update/patch/delete) live in the namespaced
    # bindy-secrets-writer Role (secrets-role.yaml) — operator namespace only.

  # Kubernetes ServiceAccounts
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    # Permissions needed:
    # - "get", "list", "watch": Read service account status
    # - "create": Create service accounts for Bind9Instance pods
    # - "update", "patch": Update service account configuration
    # - "delete": Finalizer cleanup (Bind9Instance reconciler)
    # Note: Owner references provide automatic GC, but finalizer explicitly deletes

  # Kubernetes Pods - READ-ONLY (for discovery and status)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Kubernetes Endpoints - READ-ONLY (for service discovery)
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]

  # Events for logging (no delete needed)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Leases for leader election (no delete needed for HA)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch"]
