---
# Binds the operator ServiceAccount to the namespaced bindy-secrets-writer Role.
#
# Because this is a RoleBinding (not a ClusterRoleBinding), the mutating Secret
# verbs it grants are confined to the bindy-system namespace (B-5 hardening).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bindy-secrets-writer
  namespace: bindy-system
  labels:
    app.kubernetes.io/name: bindy
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bindy-secrets-writer
subjects:
  - kind: ServiceAccount
    name: bindy
    namespace: bindy-system
