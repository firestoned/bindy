---
# Namespaced Role granting the operator the MUTATING verbs on Secrets.
#
# B-5 hardening (2026-06-09): the operator's cluster-wide ClusterRole (bindy-role)
# now only grants READ-ONLY (get/list/watch) on Secrets. The ability to
# create/update/patch/delete RNDC key Secrets is confined to this namespaced Role,
# bound (via secrets-rolebinding.yaml) only in the operator namespace. This means a
# compromised operator cannot create, modify, or delete Secrets in other namespaces
# such as kube-system.
#
# For multi-namespace deployments where Bind9Instances live outside the operator
# namespace, replicate this Role + RoleBinding into each target namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bindy-secrets-writer
  namespace: bindy-system
  labels:
    app.kubernetes.io/name: bindy
    app.kubernetes.io/component: rbac
rules:
  # Kubernetes Secrets - RNDC key lifecycle (mutating verbs, namespaced)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "delete"]
    # - "create": Generate RNDC keys for new Bind9Instance resources
    # - "update": RNDC key rotation — kube::Api::replace() (HTTP PUT) replaces the entire
    #             Secret with new key material + updated rotation count + annotations.
    # - "patch": Metadata-only changes (e.g. adding annotations without touching key data)
    # - "delete": Clean up RNDC keys when Bind9Instance is deleted (finalizer)
    # PCI-DSS 7.1.2: Minimal permissions for RNDC secret lifecycle management
