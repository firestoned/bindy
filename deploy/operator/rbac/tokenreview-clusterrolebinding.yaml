#
# Binds the `bindcar-tokenreview` ClusterRole to the operand BIND9
# ServiceAccount (`bind9`), which is the identity the bindcar sidecar runs as
# and therefore the identity that performs the TokenReview API call.
#
# Multi-namespace note: the operand `bind9` ServiceAccount is created in every
# namespace that runs a Bind9Instance. Add one subject per operand namespace
# (or create an additional ClusterRoleBinding) so bindcar can validate tokens
# from each. The default single-namespace install binds `bindy-system` only.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bindcar-tokenreview
  labels:
    app.kubernetes.io/name: bindy
    app.kubernetes.io/part-of: bindy
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bindcar-tokenreview
subjects:
  - kind: ServiceAccount
    name: bind9
    namespace: bindy-system
