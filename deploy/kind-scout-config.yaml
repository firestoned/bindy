#
# Kind cluster configuration for the Scout child cluster.
# This is a minimal single-node cluster — Scout only needs to watch
# local Ingress resources and write ARecords to the Queen Bee cluster.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: bindy-scout
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
