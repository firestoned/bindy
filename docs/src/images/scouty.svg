<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" width="680" height="640">
<defs>
  <radialGradient id="bodyG" cx="38%" cy="30%" r="60%">
    <stop offset="0%"   stop-color="#FFE27A"/>
    <stop offset="35%"  stop-color="#F5A623"/>
    <stop offset="72%"  stop-color="#D4820A"/>
    <stop offset="100%" stop-color="#A85C00"/>
  </radialGradient>
  <radialGradient id="headG" cx="36%" cy="26%" r="62%">
    <stop offset="0%"   stop-color="#FFEC90"/>
    <stop offset="28%"  stop-color="#F5A623"/>
    <stop offset="72%"  stop-color="#D4820A"/>
    <stop offset="100%" stop-color="#A05400"/>
  </radialGradient>
  <linearGradient id="wG1" x1="10%" y1="0%" x2="90%" y2="100%">
    <stop offset="0%"   stop-color="#FFFBE0" stop-opacity=".95"/>
    <stop offset="100%" stop-color="#D4A020" stop-opacity=".38"/>
  </linearGradient>
  <linearGradient id="wG2" x1="10%" y1="0%" x2="90%" y2="100%">
    <stop offset="0%"   stop-color="#FFE8A0" stop-opacity=".88"/>
    <stop offset="100%" stop-color="#C08010" stop-opacity=".35"/>
  </linearGradient>
  <linearGradient id="clipG" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#1a2030"/>
    <stop offset="100%" stop-color="#090f18"/>
  </linearGradient>
  <radialGradient id="blush" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#FF8C50" stop-opacity=".54"/>
    <stop offset="100%" stop-color="#FF8C50" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="bc">
    <ellipse cx="348" cy="415" rx="118" ry="130"/>
