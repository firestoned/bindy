name: License Compliance Scan

on:
  # Reusable workflow - can be called by other workflows
  workflow_call:
    outputs:
      compliant:
        description: 'Whether all dependency licenses are compliant'
        value: ${{ jobs.scan.outputs.compliant }}

  # Scheduled scan - weekly on Monday at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'

  # Run on pull requests when dependencies change
  pull_request:
    branches: [ main ]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/deny.toml'
      - '.github/workflows/license-scan.yaml'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  scan:
    name: Dependency License Compliance
    runs-on: ubuntu-latest
    outputs:
      compliant: ${{ steps.check.outputs.compliant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Run license compliance check
        id: check
        run: |
          if make license-check; then
            echo "compliant=true" >> "$GITHUB_OUTPUT"
          else
            echo "compliant=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Generate license report
        if: always()
        run: make license-report

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report-${{ github.run_number }}
          path: licenses.json
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          echo "## Dependency License Compliance" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** $(date -u +"%Y-%m-%d %H:%M UTC")" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f licenses.json ]; then
            TOTAL=$(jq 'length' licenses.json 2>/dev/null || echo "0")
            echo "**Total dependencies scanned:** $TOTAL" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### License Breakdown" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            jq -r '.[].license // "Unknown"' licenses.json 2>/dev/null | sort | uniq -c | sort -rn >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outputs.compliant }}" = "true" ]; then
            echo "✅ **All dependency licenses are compliant**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ **Prohibited license(s) detected — see job output for details**" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "Policy: [License Compliance](docs/src/development/license-compliance.md)" >> "$GITHUB_STEP_SUMMARY"
