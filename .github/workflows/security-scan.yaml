name: Scheduled Security Scan

on:
  # Reusable workflow - can be called by other workflows
  workflow_call:
    inputs:
      scan-type:
        description: 'Type of scan to run (all, cargo-deny, gitleaks, trivy, semgrep, kubesec)'
        required: false
        type: string
        default: 'all'

  # Scheduled scan - daily at midnight UTC
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      scan-type:
        description: 'Type of scan to run'
        required: false
        type: choice
        options:
          - all
          - cargo-deny
          - gitleaks
          - trivy
          - semgrep
          - kubesec
        default: 'all'

permissions:
  contents: read
  security-events: write
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  cargo-deny:
    name: Scan Rust Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo-deny checks (JSON output for automated issue creation)
        id: deny
        continue-on-error: true
        run: |
          make cargo-deny-json > cargo-deny-report.json || true
          if [ -f cargo-deny-report.json ]; then
            echo "report_exists=true" >> $GITHUB_OUTPUT
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload cargo-deny report
        if: steps.deny.outputs.report_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-cargo-deny-${{ github.run_number }}
          path: cargo-deny-report.json
          retention-days: 30

      - name: Parse audit results
        id: parse
        if: always()
        run: |
          if [ -f audit-report.json ]; then
            VULN_COUNT=$(jq '.vulnerabilities.count' audit-report.json || echo "0")
            echo "vuln_count=${VULN_COUNT}" >> $GITHUB_OUTPUT

            # Extract vulnerability details
            if [ "$VULN_COUNT" -gt "0" ]; then
              echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
            else
              echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "vuln_count=0" >> $GITHUB_OUTPUT
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub issue for vulnerabilities
        if: steps.parse.outputs.has_vulnerabilities == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            const vulns = report.vulnerabilities.list || [];

            // Group by severity
            const critical = vulns.filter(v => v.advisory.severity === 'critical');
            const high = vulns.filter(v => v.advisory.severity === 'high');
            const medium = vulns.filter(v => v.advisory.severity === 'medium');
            const low = vulns.filter(v => v.advisory.severity === 'low');

            const formatVulns = (vulnList) => {
              return vulnList.map(v => {
                const adv = v.advisory;
                return `- **${adv.id}**: ${v.package.name}@${v.package.version}
              - **Title**: ${adv.title}
              - **Severity**: ${adv.severity.toUpperCase()}
              - **Description**: ${adv.description}
              - **Solution**: ${adv.solution || 'Update to latest version'}
              - **More Info**: ${adv.url}`;
              }).join('\n\n');
            };

            let body = `## 🚨 Security Vulnerabilities Detected in Dependencies

            **Scan Date**: ${new Date().toISOString()}
            **Total Vulnerabilities**: ${vulns.length}

            ### Summary
            - 🔴 **CRITICAL**: ${critical.length}
            - 🟠 **HIGH**: ${high.length}
            - 🟡 **MEDIUM**: ${medium.length}
            - 🔵 **LOW**: ${low.length}

            ---

            `;

            if (critical.length > 0) {
              body += `### 🔴 CRITICAL Vulnerabilities (SLA: 24 hours)\n\n${formatVulns(critical)}\n\n---\n\n`;
            }

            if (high.length > 0) {
              body += `### 🟠 HIGH Vulnerabilities (SLA: 7 days)\n\n${formatVulns(high)}\n\n---\n\n`;
            }

            if (medium.length > 0) {
              body += `### 🟡 MEDIUM Vulnerabilities (SLA: 30 days)\n\n${formatVulns(medium)}\n\n---\n\n`;
            }

            if (low.length > 0) {
              body += `### 🔵 LOW Vulnerabilities (SLA: 90 days)\n\n${formatVulns(low)}\n\n`;
            }

            body += `\n---\n\n**Action Required**: Review and remediate vulnerabilities within SLA.\n**Compliance**: PCI-DSS 6.2, SOX IT Controls, Basel III Cyber Risk\n**Documentation**: See \`docs/security/VULNERABILITY_MANAGEMENT.md\`\n`;

            // Check if similar issue already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,vulnerability,automated',
              state: 'open'
            });

            const todayStr = new Date().toISOString().split('T')[0];
            const existingIssue = existingIssues.data.find(i =>
              i.title.includes('Vulnerabilities detected') &&
              i.title.includes(todayStr)
            );

            if (existingIssue) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## Updated Scan Results\n\n${body}`
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[SECURITY] Vulnerabilities detected in dependencies (${todayStr})`,
                body: body,
                labels: ['security', 'vulnerability', 'automated']
              });
              console.log(`Created new issue #${issue.data.number}`);
            }

  gitleaks:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive scanning

      - name: Install gitleaks
        run: make gitleaks-install

      - name: Run gitleaks scan
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks detect --source . --verbose --redact --report-format json --report-path gitleaks-report.json || true
          if [ -f gitleaks-report.json ]; then
            FINDINGS_COUNT=$(jq 'length' gitleaks-report.json || echo "0")
            echo "findings_count=${FINDINGS_COUNT}" >> $GITHUB_OUTPUT
            if [ "$FINDINGS_COUNT" -gt "0" ]; then
              echo "has_secrets=true" >> $GITHUB_OUTPUT
            else
              echo "has_secrets=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "findings_count=0" >> $GITHUB_OUTPUT
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-gitleaks-${{ github.run_number }}
          path: gitleaks-report.json
          retention-days: 90

      - name: Create GitHub issue for secrets
        if: steps.gitleaks.outputs.has_secrets == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('gitleaks-report.json', 'utf8'));
            const findings = report || [];

            let body = `## 🚨 CRITICAL: Secrets Detected in Repository

            **Scan Date**: ${new Date().toISOString()}
            **Total Secrets Found**: ${findings.length}

            ### ⚠️ IMMEDIATE ACTION REQUIRED

            Secrets detected in the repository must be rotated immediately as they may have been exposed.

            ### Findings Summary

            `;

            findings.slice(0, 10).forEach((finding, idx) => {
              body += `
            ${idx + 1}. **${finding.RuleID}**
               - **File**: \`${finding.File}\`
               - **Line**: ${finding.StartLine}
               - **Commit**: \`${finding.Commit?.substring(0, 7) || 'N/A'}\`
               - **Description**: ${finding.Description || 'Secret detected'}
               - **Match**: ${finding.Match ? '[REDACTED]' : 'See artifact for details'}

            `;
            });

            if (findings.length > 10) {
              body += `\n... and ${findings.length - 10} more findings. Check the workflow artifact for full report.\n`;
            }

            body += `
            ---

            ### Remediation Steps

            1. **Rotate all exposed secrets immediately**
            2. **Remove secrets from git history** (use \`git filter-repo\` or BFG Repo-Cleaner)
            3. **Update code to use environment variables or Kubernetes secrets**
            4. **Add secrets to .gitleaks.toml allowlist if false positives**
            5. **Enable pre-commit hooks**: \`make install-git-hooks\`

            ### Compliance Impact

            - **PCI-DSS**: Requirement 8.2.1 (Credential Management)
            - **SOX**: IT General Controls (ITGC)
            - **Basel III**: Cyber Risk Management

            **Full Report**: Check workflow artifacts for complete gitleaks scan results
            `;

            // Check for existing issue
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,secrets,critical,automated',
              state: 'open'
            });

            const todayStr = new Date().toISOString().split('T')[0];
            const existingIssue = existingIssues.data.find(i =>
              i.title.includes('Secrets detected') &&
              i.title.includes(todayStr)
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## Updated Scan Results\n\n${body}`
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[CRITICAL] Secrets detected in repository (${todayStr})`,
                body: body,
                labels: ['security', 'secrets', 'critical', 'automated']
              });
              console.log(`Created new issue #${issue.data.number}`);
            }

  trivy-scan:
    name: Scan Container Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - name: chainguard
            tag: latest
            description: "Chainguard Zero-CVE"
          - name: distroless
            tag: latest-distroless
            description: "Google Distroless"
          - name: chainguard-main
            tag: main
            description: "Chainguard Main Branch"
          - name: distroless-main
            tag: main-distroless
            description: "Distroless Main Branch"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy scan on ${{ matrix.variant.description }}
        continue-on-error: true
        id: trivy
        uses: firestoned/github-actions/security/trivy-scan@v1.3.4
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ matrix.variant.tag }}
          sarif-category: trivy-scheduled-${{ matrix.variant.name }}
          upload-artifact-name: trivy-scan-${{ matrix.variant.name }}-${{ github.run_number }}
          output-filename: trivy-${{ matrix.variant.name }}.json

      - name: Parse Trivy results
        id: parse
        if: always()
        run: |
          if [ -f trivy-${{ matrix.variant.name }}.json ]; then
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-${{ matrix.variant.name }}.json || echo "0")
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-${{ matrix.variant.name }}.json || echo "0")
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-${{ matrix.variant.name }}.json || echo "0")

            echo "critical=${CRITICAL}" >> $GITHUB_OUTPUT
            echo "high=${HIGH}" >> $GITHUB_OUTPUT
            echo "medium=${MEDIUM}" >> $GITHUB_OUTPUT

            TOTAL=$((CRITICAL + HIGH))
            if [ "$TOTAL" -gt "0" ]; then
              echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
            else
              echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub issue for container vulnerabilities
        if: steps.parse.outputs.has_vulnerabilities == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const variantName = '${{ matrix.variant.name }}';
            const variantTag = '${{ matrix.variant.tag }}';
            const variantDesc = '${{ matrix.variant.description }}';
            const report = JSON.parse(fs.readFileSync(`trivy-${variantName}.json`, 'utf8'));

            const critical = ${{ steps.parse.outputs.critical }};
            const high = ${{ steps.parse.outputs.high }};
            const medium = ${{ steps.parse.outputs.medium }};

            let vulnDetails = '';
            if (report.Results) {
              for (const result of report.Results) {
                if (result.Vulnerabilities && result.Vulnerabilities.length > 0) {
                  vulnDetails += `\n### ${result.Target}\n\n`;

                  const critVulns = result.Vulnerabilities.filter(v => v.Severity === 'CRITICAL');
                  const highVulns = result.Vulnerabilities.filter(v => v.Severity === 'HIGH');

                  if (critVulns.length > 0) {
                    vulnDetails += `#### 🔴 CRITICAL\n\n`;
                    critVulns.slice(0, 5).forEach(v => {
                      vulnDetails += `- **${v.VulnerabilityID}**: ${v.PkgName}@${v.InstalledVersion}\n`;
                      vulnDetails += `  - ${v.Title || v.Description}\n`;
                      if (v.FixedVersion) vulnDetails += `  - Fix: Upgrade to ${v.FixedVersion}\n`;
                      vulnDetails += `\n`;
                    });
                    if (critVulns.length > 5) vulnDetails += `... and ${critVulns.length - 5} more CRITICAL\n\n`;
                  }

                  if (highVulns.length > 0) {
                    vulnDetails += `#### 🟠 HIGH\n\n`;
                    highVulns.slice(0, 5).forEach(v => {
                      vulnDetails += `- **${v.VulnerabilityID}**: ${v.PkgName}@${v.InstalledVersion}\n`;
                      vulnDetails += `  - ${v.Title || v.Description}\n`;
                      if (v.FixedVersion) vulnDetails += `  - Fix: Upgrade to ${v.FixedVersion}\n`;
                      vulnDetails += `\n`;
                    });
                    if (highVulns.length > 5) vulnDetails += `... and ${highVulns.length - 5} more HIGH\n\n`;
                  }
                }
              }
            }

            const body = `## 🚨 Container Image Vulnerabilities Detected

            **Image**: \`ghcr.io/${{ github.repository }}:${variantTag}\` (${variantDesc})
            **Scan Date**: ${new Date().toISOString()}

            ### Summary
            - 🔴 **CRITICAL**: ${critical}
            - 🟠 **HIGH**: ${high}
            - 🟡 **MEDIUM**: ${medium}

            ${vulnDetails}

            ---

            **Action Required**: Review and remediate vulnerabilities within SLA.
            - CRITICAL: 24 hours
            - HIGH: 7 days

            **Compliance**: PCI-DSS 6.2, SOX IT Controls, Basel III Cyber Risk
            **Full Report**: Check workflow artifacts for complete Trivy scan results

            **Note**: If this is the Distroless variant, consider switching to the Chainguard variant which has daily security updates and zero known CVEs.
            `;

            // Check for existing issue
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,container-vulnerability,automated',
              state: 'open'
            });

            const todayStr = new Date().toISOString().split('T')[0];
            const existingIssue = existingIssues.data.find(i =>
              i.title.includes('Container vulnerabilities') &&
              i.title.includes(variantName) &&
              i.title.includes(todayStr)
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## Updated Scan Results\n\n${body}`
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[SECURITY] Container vulnerabilities in ${variantName} (${todayStr})`,
                body: body,
                labels: ['security', 'container-vulnerability', 'automated']
              });
              console.log(`Created new issue #${issue.data.number}`);
            }

  trivy-fs:
    name: Scan Filesystem
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: make trivy-install

      - name: Run Trivy filesystem scan
        id: trivy-fs
        continue-on-error: true
        run: |
          make trivy-fs-sarif
          if [ -f trivy-fs-results.sarif ]; then
            echo "sarif_exists=true" >> $GITHUB_OUTPUT
          else
            echo "sarif_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Trivy filesystem results to GitHub Security
        if: steps.trivy-fs.outputs.sarif_exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      - name: Upload Trivy filesystem results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results-${{ github.run_number }}
          path: trivy-fs-results.sarif
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          echo "## Trivy Filesystem Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-fs-results.sarif ]; then
            CRITICAL=$(jq '[.runs[].results[]? | select(.level=="error")] | length' trivy-fs-results.sarif 2>/dev/null || echo "0")
            HIGH=$(jq '[.runs[].results[]? | select(.level=="warning")] | length' trivy-fs-results.sarif 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.runs[].results[]? | select(.level=="note")] | length' trivy-fs-results.sarif 2>/dev/null || echo "0")
            TOTAL=$((CRITICAL + HIGH + MEDIUM))
            echo "- 🔴 **CRITICAL:** $CRITICAL" >> $GITHUB_STEP_SUMMARY
            echo "- 🟠 **HIGH:** $HIGH" >> $GITHUB_STEP_SUMMARY
            echo "- 🟡 **MEDIUM:** $MEDIUM" >> $GITHUB_STEP_SUMMARY
            echo "- **Total:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "$TOTAL" -gt "0" ]; then
              echo "⚠️ **Action Required:** Review findings in the [Security tab](${{ github.server_url }}/${{ github.repository }}/security/code-scanning)" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ **No vulnerabilities detected**" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ SARIF file not found - check Trivy scan logs" >> $GITHUB_STEP_SUMMARY
          fi

