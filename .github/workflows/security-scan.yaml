          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-k8s-results.sarif ]; then
            CRITICAL=$(jq '[.runs[].results[]? | select(.level=="error")] | length' trivy-k8s-results.sarif 2>/dev/null || echo "0")
            HIGH=$(jq '[.runs[].results[]? | select(.level=="warning")] | length' trivy-k8s-results.sarif 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.runs[].results[]? | select(.level=="note")] | length' trivy-k8s-results.sarif 2>/dev/null || echo "0")
