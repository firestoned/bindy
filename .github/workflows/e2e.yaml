#
# Reusable end-to-end test workflow.
#
# Builds the operator image locally (no registry) and runs the full e2e gate
# against it in kind:
#   1. Integration suite   — simple zone/record lifecycle (tests/integration_test.sh)
#   2. Regression suite     — admission policies + operand pod-shape + liveness
#                             (tests/regression_test.sh: bindcar 0.7.x Mode B contract)
#
# All logic lives in the `ci-e2e` Makefile target (workflows delegate to the
# Makefile per repo convention). Self-contained: no pushed image, no
# cross-workflow timing, no registry credentials.
#
# Callable via `workflow_call` (e.g. from dependabot-auto-merge.yaml) or run
# manually via `workflow_dispatch`.

name: E2E Tests

on:
  pull_request:
    paths:
      - '.github/workflows/e2e.yaml'
      - 'Makefile'
      - 'rust-toolchain.toml'
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: Integration + Regression (kind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Rust build environment
        uses: firestoned/github-actions/rust/setup-rust-build@53b483254bc648903c364ee3c73a546d0936a91e # v1.3.6
        with:
          target: x86_64-unknown-linux-gnu

      - name: Install Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          # kind v0.24.0 provisions Kubernetes v1.31 by default. ValidatingAdmissionPolicy
          # (exercised by the regression suite) is GA only on 1.30+, so this must
          # stay >= v0.23.0.
          install_only: true
          version: v0.24.0

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
        with:
          version: 'v1.31.0'

      - name: Run full e2e (integration + regression)
        run: make ci-e2e

      - name: Dump Kubernetes diagnostics on failure
        if: failure()
        run: |
          for ctx in kind-bindy-e2e kind-bindy-regression; do
            echo "::group::cluster summary ($ctx)"
            kubectl --context "$ctx" get nodes -o wide 2>/dev/null || true
            kubectl --context "$ctx" get ns 2>/dev/null || true
            kubectl --context "$ctx" get crd -o wide 2>/dev/null || true
            kubectl --context "$ctx" get pods -A -o wide 2>/dev/null || true
            echo "::endgroup::"

            echo "::group::events ($ctx)"
            kubectl --context "$ctx" get events -A --sort-by=.lastTimestamp 2>/dev/null || true
            echo "::endgroup::"

            echo "::group::bindy operator ($ctx)"
            kubectl --context "$ctx" -n bindy-system get deploy,rs,pod,svc,secret -o wide 2>/dev/null || true
            kubectl --context "$ctx" -n bindy-system describe pod -l app=bindy 2>/dev/null || true
            kubectl --context "$ctx" -n bindy-system logs -l app=bindy --all-containers --tail=300 --prefix 2>/dev/null || true
            echo "::endgroup::"

            echo "::group::label-selector integration namespace ($ctx)"
            kubectl --context "$ctx" -n bindy-label-selector-test get bind9cluster,bind9instance,deploy,rs,pod,svc,secret,configmap -o wide 2>/dev/null || true
            kubectl --context "$ctx" -n bindy-label-selector-test get bind9instance test-pod-labels -o yaml 2>/dev/null || true
            kubectl --context "$ctx" -n bindy-label-selector-test describe pod -l app.kubernetes.io/instance=test-pod-labels 2>/dev/null || true
            kubectl --context "$ctx" -n bindy-label-selector-test logs -l app.kubernetes.io/instance=test-pod-labels --all-containers --tail=300 --prefix 2>/dev/null || true
            kubectl --context "$ctx" auth can-i create secrets -n bindy-label-selector-test --as system:serviceaccount:bindy-system:bindy 2>/dev/null || true
            kubectl --context "$ctx" auth can-i create tokenreviews.authentication.k8s.io --as system:serviceaccount:bindy-label-selector-test:bind9 2>/dev/null || true
            kubectl --context "$ctx" get clusterrolebinding bindcar-tokenreview -o yaml 2>/dev/null || true
            echo "::endgroup::"
          done
