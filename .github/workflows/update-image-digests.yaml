name: Update Image Digests

on:
  schedule:
    # Run nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-digests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Update image digests
        run: make update-image-digests

      - name: Check for digest changes
        id: changes
        run: |
          if git diff --quiet docker/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy CVE scan
        id: trivy
        run: |
          if make trivy-fs-ci; then
            echo "failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR body
        id: pr-body
        if: steps.changes.outputs.changed == 'true' || steps.trivy.outputs.failed == 'true'
        run: |
          DIGEST_STATUS="✅ No digest changes"
          if [[ "${{ steps.changes.outputs.changed }}" == "true" ]]; then
            DIGEST_STATUS="✅ Digests updated (see diff)"
          fi

          TRIVY_STATUS="✅ No HIGH/CRITICAL CVEs found"
          if [[ "${{ steps.trivy.outputs.failed }}" == "true" ]]; then
            TRIVY_STATUS="🔴 HIGH/CRITICAL CVEs detected — review required"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Nightly Digest Update Summary

          | Check | Result |
          |-------|--------|
          | Digest changes | ${DIGEST_STATUS} |
          | Trivy CVE scan | ${TRIVY_STATUS} |
          EOF

          cat > /tmp/pr-body.md << EOF
          ## Nightly Image Digest Update

          | Check | Result |
          |-------|--------|
          | Digest changes | ${DIGEST_STATUS} |
          | Trivy CVE scan | ${TRIVY_STATUS} |

          ### Why

          Base images are pinned by digest for reproducible builds (SLSA Level 2). Digests are bumped
          nightly so security patches from Debian, Chainguard, Alpine, and the Rust toolchain are
          picked up promptly. A PR is opened when digests change **or** when Trivy finds CVEs.

          ### Testing

          - [ ] Docker builds complete successfully
          - [ ] Integration tests pass
          - [ ] Trivy scan clean after merge

          ---
          *Automatically created by the \`update-image-digests\` workflow.*
          EOF

          echo "path=/tmp/pr-body.md" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true' || steps.trivy.outputs.failed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: Update pinned container image digests"
          branch: chore/update-image-digests
          delete-branch: true
          title: 'chore: Update pinned container image digests'
          body-path: /tmp/pr-body.md
          labels: |
            dependencies
            security
            automated

      - name: All clear — no PR needed
        if: steps.changes.outputs.changed == 'false' && steps.trivy.outputs.failed == 'false'
        run: echo "✓ All digests up to date and no CVEs found" >> "$GITHUB_STEP_SUMMARY"
