name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write
  packages: write
  security-events: write  # For uploading SARIF results
  id-token: write  # For keyless signing with Cosign

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  license-check:
    name: Verify SPDX License Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check license headers
        uses: firestoned/github-actions/security/license-check@v1.3.6
        with:
          copyright-holder: "Erick Bourgeois, firestoned"
          license-id: "MIT"

  verify-commits:
    name: Verify Signed Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for verification

      - name: Verify release tag commit is signed
        uses: firestoned/github-actions/security/verify-signed-commits@v1.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          verify-mode: release

  extract-version:
    name: Extract Version from Tag
    runs-on: ubuntu-latest
    needs: [license-check, verify-commits]
    outputs:
      version: ${{ steps.version-chainguard.outputs.version }}
      tag_name: ${{ steps.version-chainguard.outputs.tag-name }}
      image-tag-chainguard: ${{ steps.version-chainguard.outputs.image-tag }}
      image-tag-distroless: ${{ steps.version-distroless.outputs.image-tag }}
      image-repository-chainguard: ${{ steps.version-chainguard.outputs.image-repository }}
      image-repository-distroless: ${{ steps.version-distroless.outputs.image-repository }}
      short-sha: ${{ steps.version-chainguard.outputs.short-sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version for Chainguard
        id: version-chainguard
        uses: firestoned/github-actions/versioning/extract-version@v1.3.6
        with:
          repository: firestoned/bindy
          workflow-type: release
          release-tag: ${{ github.event.release.tag_name }}
          image-tag-suffix: ""

      - name: Extract version for Distroless
        id: version-distroless
        uses: firestoned/github-actions/versioning/extract-version@v1.3.6
        with:
          repository: firestoned/bindy
          workflow-type: release
          release-tag: ${{ github.event.release.tag_name }}
          image-tag-suffix: "-distroless"

  vex-validate:
    name: Validate VEX Documents
    runs-on: ubuntu-latest
    needs: extract-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Validate VEX documents
        run: make vex-validate

      - name: Upload VEX documents as artifact
        uses: actions/upload-artifact@v7
        with:
          name: vex-documents
          path: vex/*.openvex.json

  build:
    name: Build - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: bindy-linux-amd64
            binary_name: bindy
          - name: Linux ARM64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: bindy-linux-arm64
            binary_name: bindy
          - name: macOS x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: bindy-macos-amd64
            binary_name: bindy
          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: bindy-macos-arm64
            binary_name: bindy
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: bindy-windows-amd64
            binary_name: bindy.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Update Cargo.toml version
        shell: bash
        run: |
          perl -i -pe 's/^version = ".*"/version = "${{ needs.extract-version.outputs.version }}"/' Cargo.toml
          echo "Updated Cargo.toml to version ${{ needs.extract-version.outputs.version }}"
          grep '^version = ' Cargo.toml

      # Linux: custom action handles cross-compilation setup for ARM64
      - name: Setup Rust build environment (Linux)
        if: runner.os == 'Linux'
        uses: firestoned/github-actions/rust/setup-rust-build@v1.3.6
        with:
          target: ${{ matrix.platform.target }}
          cache-key: release-${{ needs.extract-version.outputs.version }}

      # macOS/Windows: native build; macOS x86_64 is cross-compiled on ARM64 macos-latest runner
      - name: Setup Rust toolchain (macOS/Windows)
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      # macos-latest is ARM64; x86_64-apple-darwin requires explicit target addition
      - name: Add x86_64 target for cross-compilation (macOS)
        if: matrix.platform.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Cache cargo dependencies (macOS/Windows)
        if: runner.os != 'Linux'
        uses: firestoned/github-actions/rust/cache-cargo@v1.3.6

      - name: Build binary (Linux)
        if: runner.os == 'Linux'
        uses: firestoned/github-actions/rust/build-binary@v1.3.6
        with:
          target: ${{ matrix.platform.target }}

      - name: Build binary (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Generate SBOM (Linux only)
        if: runner.os == 'Linux'
        uses: firestoned/github-actions/rust/generate-sbom@v1.3.6
        with:
          target: ${{ matrix.platform.target }}

      - name: Upload binary and SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: |
            target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary_name }}
            target/${{ matrix.platform.target }}/release/*.cdx.json

  docker-release:
    name: Build and Push Docker Image - ${{ matrix.variant.name }}
    runs-on: ubuntu-latest
    needs: [extract-version, build]
    permissions:
      contents: write
      packages: write
      id-token: write  # For keyless signing with Cosign
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: Chainguard
            dockerfile: docker/Dockerfile.chainguard
            suffix: ""
            description: "Firestoned bindy Chainguard Zero-CVE"
            image-tag: ${{ needs.extract-version.outputs.image-tag-chainguard }}
            image-repository: ${{ needs.extract-version.outputs.image-repository-chainguard }}
          - name: Distroless
            dockerfile: docker/Dockerfile
            suffix: "-distroless"
            description: "Firestoned bindy Distroless"
            image-tag: ${{ needs.extract-version.outputs.image-tag-distroless }}
            image-repository: ${{ needs.extract-version.outputs.image-repository-distroless }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare Docker binaries
        uses: ./.github/actions/prepare-docker-binaries

      - name: Setup Docker environment
        uses: firestoned/github-actions/docker/setup-docker@v1.3.6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ matrix.variant.image-repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=sha-${{ needs.extract-version.outputs.short-sha }}
            type=raw,value=${{ matrix.variant.image-tag }}
          flavor: |
            latest=false
            prefix=v

      - name: Build and push Docker image (${{ matrix.variant.name }})
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.description=${{ matrix.variant.description }}
          build-args: |
            VERSION=${{ needs.extract-version.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.variant.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.name }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true

      - name: Sign container image with Cosign
        uses: firestoned/github-actions/security/cosign-sign@v1.3.6
        with:
          image-digest: ${{ steps.docker_build.outputs.digest }}
          image-tags: ${{ matrix.variant.image-tag }}
          registry: ghcr.io
          repository: ${{ matrix.variant.image-repository }}

      - name: Generate Docker SBOM for ${{ matrix.variant.name }}
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ matrix.variant.image-repository }}:${{ matrix.variant.image-tag }}
          format: cyclonedx-json
          output-file: docker-sbom-${{ matrix.variant.name }}.json

      - name: Upload Docker SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-sbom-${{ matrix.variant.name }}
          path: docker-sbom-${{ matrix.variant.name }}.json

  sign-artifacts:
    name: Sign Binary Artifacts
    runs-on: ubuntu-latest
    needs: [build, extract-version]
    permissions:
      id-token: write  # For keyless signing with Cosign
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            artifact_name: bindy-linux-amd64
            binary_name: bindy
          - name: Linux ARM64
            artifact_name: bindy-linux-arm64
            binary_name: bindy
          - name: macOS x86_64
            artifact_name: bindy-macos-amd64
            binary_name: bindy
          - name: macOS ARM64
            artifact_name: bindy-macos-arm64
            binary_name: bindy
          - name: Windows x86_64
            artifact_name: bindy-windows-amd64
            binary_name: bindy.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ./artifacts/${{ matrix.platform.artifact_name }}

      - name: Create tarball for signing
        run: |
          cd artifacts/${{ matrix.platform.artifact_name }}
          chmod +x ${{ matrix.platform.binary_name }} 2>/dev/null || true
          tar czf ${{ matrix.platform.artifact_name }}.tar.gz ${{ matrix.platform.binary_name }}
          ls -lh ${{ matrix.platform.artifact_name }}.tar.gz

      - name: Sign binary tarball with Cosign
        uses: firestoned/github-actions/security/cosign-sign@v1.3.6
        with:
          artifact-path: artifacts/${{ matrix.platform.artifact_name }}/${{ matrix.platform.artifact_name }}.tar.gz

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.artifact_name }}-signed
          path: |
            artifacts/${{ matrix.platform.artifact_name }}/${{ matrix.platform.artifact_name }}.tar.gz
            artifacts/${{ matrix.platform.artifact_name }}/${{ matrix.platform.artifact_name }}.tar.gz.bundle

  generate-provenance-subjects:
    name: Generate SLSA Provenance Subjects
    runs-on: ubuntu-latest
    needs: [sign-artifacts, extract-version]
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bindy-*-signed
          path: ./artifacts
          merge-multiple: true

      - name: Generate hashes for SLSA provenance
        id: hash
        run: |
          cd artifacts
          # Generate SHA256 hashes for all signed tarballs
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt
          echo "hashes=$(cat checksums.txt | base64 -w0)" >> "$GITHUB_OUTPUT"

  slsa-provenance:
    name: Generate SLSA Provenance
    needs: [generate-provenance-subjects, extract-version]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.generate-provenance-subjects.outputs.hashes }}"
      upload-assets: true
      provenance-name: "${{ needs.extract-version.outputs.version }}.intoto.jsonl"

  package-deploy-manifests:
    name: Package Deployment Manifests
    runs-on: ubuntu-latest
    needs: extract-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust build environment
        uses: firestoned/github-actions/rust/setup-rust-build@v1.3.6
        with:
          target: x86_64-unknown-linux-gnu
          cache-key: release-${{ needs.extract-version.outputs.version }}

      - name: Generate release manifests
        run: make release-manifests VERSION=${{ github.event.release.tag_name }}

      - name: Upload deploy manifests
        uses: actions/upload-artifact@v7
        with:
          name: deploy-manifests
          path: |
            deploy/install.yaml
            deploy/scout.yaml

  upload-release-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [build, docker-release, sign-artifacts, slsa-provenance, package-deploy-manifests, vex-validate]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Organize release artifacts
        run: |
          cd artifacts
          mkdir -p release sboms signatures provenance vex

          # Copy deployment manifests
          if [ -d "deploy-manifests" ]; then
            echo "Copying deployment manifests..."
            if [ -f "deploy-manifests/install.yaml" ]; then
              cp deploy-manifests/install.yaml release/
            fi
            if [ -f "deploy-manifests/scout.yaml" ]; then
              cp deploy-manifests/scout.yaml release/
            fi
          fi

          # Copy signed tarballs and signature bundles
          for dir in bindy-*-signed; do
            if [ -d "$dir" ]; then
              platform="${dir%-signed}"
              echo "Processing signed artifacts for $platform..."

              # Copy tarball
              if compgen -G "$dir/*.tar.gz" > /dev/null; then
                cp "$dir"/*.tar.gz release/
              fi

              # Copy signature bundle
              if compgen -G "$dir/*.tar.gz.bundle" > /dev/null; then
                cp "$dir"/*.tar.gz.bundle signatures/
              fi
            fi
          done

          # Collect all SBOM files (using default cargo-cyclonedx naming, Linux builds only)
          for dir in bindy-linux-amd64 bindy-linux-arm64 bindy-macos-amd64 bindy-macos-arm64 bindy-windows-amd64; do
            if [ -d "$dir" ]; then
              # Find any .cdx.json files (cargo-cyclonedx default naming)
              if compgen -G "$dir/*.cdx.json" > /dev/null; then
                cp "$dir"/*.cdx.json "sboms/${dir}-sbom.json"
              fi
            fi
          done

          # Copy Docker SBOMs for both variants
          for variant in Chainguard Distroless; do
            if [ -d "docker-sbom-${variant}" ] && [ -f "docker-sbom-${variant}/docker-sbom-${variant}.json" ]; then
              cp "docker-sbom-${variant}/docker-sbom-${variant}.json" "sboms/docker-sbom-${variant}.json"
            fi
          done

          # Copy SLSA provenance (generated by slsa-github-generator)
          # The SLSA generator creates a directory named after the provenance file
          if compgen -G "*.intoto.jsonl" > /dev/null; then
            # Find and copy the actual .intoto.jsonl file from within the directory
            find . -name "*.intoto.jsonl" -type f -exec cp {} provenance/ \;
          fi

          # Copy VEX documents
          if [ -d "vex-documents" ]; then
            echo "Copying VEX documents..."
            cp vex-documents/*.openvex.json vex/
          fi

          # Generate SHA256 checksums for all release artifacts
          cd release
          sha256sum *.tar.gz > checksums.sha256
          if [ -f "install.yaml" ]; then
            sha256sum install.yaml >> checksums.sha256
          fi
          if [ -f "scout.yaml" ]; then
            sha256sum scout.yaml >> checksums.sha256
          fi
          cd ../sboms
          sha256sum *.json >> ../release/checksums.sha256
          cd ../signatures
          sha256sum *.bundle >> ../release/checksums.sha256
          cd ../provenance
          if compgen -G "*.intoto.jsonl" > /dev/null; then
            sha256sum *.intoto.jsonl >> ../release/checksums.sha256
          fi
          cd ../vex
          if compgen -G "*.openvex.json" > /dev/null; then
            sha256sum *.openvex.json >> ../release/checksums.sha256
          fi

          echo "Release artifacts prepared:"
          ls -lh ../release/
          echo "Provenance files:"
          ls -lh ../provenance/ || echo "No provenance files found"
          echo "VEX documents:"
          ls -lh ../vex/ || echo "No VEX documents found"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release/*.tar.gz
            artifacts/release/install.yaml
            artifacts/release/scout.yaml
            artifacts/sboms/*.json
            artifacts/vex/*.openvex.json
            artifacts/signatures/*.bundle
            artifacts/provenance/*.intoto.jsonl
            artifacts/release/checksums.sha256

  security:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: extract-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run security scan
        uses: firestoned/github-actions/rust/security-scan@v1.3.6
        with:
          cargo-audit-version: "0.22.0"
          upload-artifact-name: cargo-audit-report-release

  trivy:
    name: Container Security Scan - ${{ matrix.variant.name }}
    runs-on: ubuntu-latest
    needs: [extract-version, docker-release]
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: Chainguard
            image-tag: ${{ needs.extract-version.outputs.image-tag-chainguard }}
            image-repository: ${{ needs.extract-version.outputs.image-repository-chainguard }}
          - name: Distroless
            image-tag: ${{ needs.extract-version.outputs.image-tag-distroless }}
            image-repository: ${{ needs.extract-version.outputs.image-repository-distroless }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy scan on ${{ matrix.variant.name }} image
        uses: firestoned/github-actions/security/trivy-scan@v1.3.6
        with:
          image-ref: ghcr.io/${{ matrix.variant.image-repository }}:${{ matrix.variant.image-tag }}
          sarif-category: trivy-release-${{ matrix.variant.name }}
          upload-artifact-name: trivy-release-${{ matrix.variant.name }}
          output-filename: trivy-release-${{ matrix.variant.name }}.json
