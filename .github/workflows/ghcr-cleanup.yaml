name: GHCR Image Cleanup

# Prunes stale container image versions from GHCR so the package does not
# accumulate thousands of untagged orphan layers and old dev snapshots (the
# nightly Trivy scan keeps re-flagging aged main/dev images). This does NOT
# touch released images — semver tags and the floating release/main tags are
# always preserved (see `exclude-tags` below).
on:
  # Daily at 02:00 UTC (after the 00:00 security scan, before the working day).
  schedule:
    - cron: '0 2 * * *'

  # Manual run — use dry_run=true first to preview what WOULD be deleted.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only — do not delete anything'
        required: false
        type: boolean
        default: true

  # Reusable by other workflows.
  workflow_call:
    inputs:
      dry_run:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  # Required to delete container package versions.
  packages: write

jobs:
  cleanup:
    name: Prune stale GHCR image versions
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale image versions
        # Manifest-aware cleanup: understands multi-arch manifest lists, so the
        # per-platform child digests of a preserved tag are NOT orphaned.
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          owner: firestoned
          package: bindy
          use-regex: true
          # DELETE ONLY dated `main-<date>` snapshots — dash or dot date form,
          # with an optional `-distroless` variant (e.g. `main-2026-07-18`,
          # `main-2026.07.18`, `main-2026.07.18-distroless`). Nothing else is ever
          # a deletion candidate: semver releases (incl. `-distroless` variants),
          # `latest`/`main`, `sha-*`, and `pr-*` do NOT match this pattern and are
          # left untouched. This replaces the old `keep-n-tagged: 20` model, which
          # pruned any non-excluded tag beyond the 20 newest — including semver
          # `-distroless` variants that the exclude list didn't cover.
          delete-tags: '^main-20[0-9]{2}[-.][0-9]{2}[-.][0-9]{2}(-distroless)?$'
          # Defense-in-depth: even if delete-tags is ever loosened, never delete a
          # released image or floating tag. Semver is unrolled into three patterns
          # (0 / 0.5 / 0.5.2, optional `v` prefix, optional `-distroless`) because
          # the action's ReDoS guard rejects a quantified group like
          # (\.[0-9]+){0,2} as nested quantifiers.
          exclude-tags: '^latest$,^latest-distroless$,^main$,^main-distroless$,^v?[0-9]+(-distroless)?$,^v?[0-9]+\.[0-9]+(-distroless)?$,^v?[0-9]+\.[0-9]+\.[0-9]+(-distroless)?$'
          # Reap untagged orphan layers/attestations left by every build
          # (manifest-aware, so child digests of preserved multi-arch tags are
          # kept). This removes no named version — only unreferenced orphans.
          delete-untagged: true
          # Safety window: never touch anything created in the last 14 days, so
          # recent daily `main-<date>` snapshots are retained.
          older-than: 14 days
          # Verify multi-arch manifest integrity in the registry after cleanup.
          validate: true
          # schedule/workflow_call => real run; manual dispatch defaults to preview.
          dry-run: ${{ inputs.dry_run || false }}
          log-level: info
