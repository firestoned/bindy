name: OpenSSF Scorecard

on:
  # Run on branch protection changes
  branch_protection_rule:
  # Run weekly
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3 AM UTC
  # Allow manual runs
  workflow_dispatch:
  # Run on pushes to main that change security-relevant files
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

# Declare default permissions as read-only
permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload results to code-scanning dashboard
      security-events: write
      # Needed to publish results
      id-token: write
      # Uncomment the permissions below if installing in a private repository.
      # contents: read
      # actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to OpenSSF REST API for aggregate statistics
          publish_results: true

      # Upload results to GitHub's code scanning dashboard
      - name: Upload SARIF results to code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: results.sarif

      # Upload results as workflow artifact
      - name: Upload Scorecard results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 90
